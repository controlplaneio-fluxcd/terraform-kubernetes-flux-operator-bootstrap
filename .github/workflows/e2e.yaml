name: e2e

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  statuses: write

jobs:
  e2e-pending:
    runs-on: ubuntu-latest
    steps:
      - name: Set pending status on PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api "repos/${{ github.repository }}/statuses/${{ github.sha }}" \
            -f state=pending \
            -f context="e2e" \
            -f description="End-to-end tests running" \
            -f target_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

  e2e-batch:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        batch: [1, 2, 3, 4]
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1

      - name: Set up Kind
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1.14.0
        with:
          install_only: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Run end-to-end test (batch ${{ matrix.batch }})
        run: make docker-build e2e-batch-${{ matrix.batch }}

  e2e-migration:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1

      - name: Set up Kind
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1.14.0
        with:
          install_only: true

      - name: Set up Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0

      - name: Set up Flux CLI
        uses: fluxcd/flux2/action@54e4ba378e155ada619caafdc599e5c4d759ce5c # v2.8.7

      - name: Set up flux-operator CLI
        uses: controlplaneio-fluxcd/flux-operator/actions/setup@8fc996ab460c0aee9e02397fefaad1ff78f4e7bb # v0.48.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Run migration end-to-end test
        run: make docker-build e2e-migration

  e2e-critical-components:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1

      - name: Set up Kind
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1.14.0
        with:
          install_only: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Run critical components end-to-end test
        run: make docker-build e2e-critical-components

  e2e-debug-shell:
    # Windows-only smoke test that exercises the debug_on_failure local-exec
    # template against a fake kubectl on PATH. Validates that the bash
    # interpreter (Git Bash on Windows) can run the same template the module
    # ships, without needing Docker or kind. The full Linux end-to-end is
    # already covered by e2e-batch (matrix entry 2).
    runs-on: windows-latest
    name: e2e-debug-shell on Windows
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1

      - name: Verify toolchain
        shell: bash
        run: |
          set -euo pipefail
          echo "RUNNER_OS=$RUNNER_OS"
          command -v bash
          bash --version | head -1
          command -v terraform
          terraform version

      - name: Run debug shell smoke test
        shell: bash
        run: bash ./scripts/e2e-debug-shell.sh

  e2e:
    if: always()
    needs: [e2e-pending, e2e-batch, e2e-migration, e2e-critical-components, e2e-debug-shell]
    runs-on: ubuntu-latest
    steps:
      - name: Update status on PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for result in "${{ needs.e2e-batch.result }}" "${{ needs.e2e-migration.result }}" "${{ needs.e2e-critical-components.result }}" "${{ needs.e2e-debug-shell.result }}"; do
            if [ "$result" != "success" ] && [ "$result" != "skipped" ]; then
              gh api "repos/${{ github.repository }}/statuses/${{ github.sha }}" \
                -f state=failure \
                -f context="e2e" \
                -f description="End-to-end tests failed" \
                -f target_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
              exit 1
            fi
          done
          gh api "repos/${{ github.repository }}/statuses/${{ github.sha }}" \
            -f state=success \
            -f context="e2e" \
            -f description="End-to-end tests passed" \
            -f target_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

      - name: Verify result
        run: |
          for result in "${{ needs.e2e-batch.result }}" "${{ needs.e2e-migration.result }}" "${{ needs.e2e-critical-components.result }}" "${{ needs.e2e-debug-shell.result }}"; do
            [ "$result" = "success" ] || [ "$result" = "skipped" ] || exit 1
          done
