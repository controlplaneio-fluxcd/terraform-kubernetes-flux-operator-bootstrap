name: e2e

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  statuses: write

jobs:
  e2e-pending:
    # Fork PRs don't have write access to the statuses API, so skip the
    # commit-status updates entirely. The e2e aggregate job still enforces
    # pass/fail via its Verify result step.
    if: github.event.pull_request.head.repo.fork != true
    runs-on: ubuntu-latest
    steps:
      - name: Set pending status on PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api "repos/${{ github.repository }}/statuses/${{ github.sha }}" \
            -f state=pending \
            -f context="e2e" \
            -f description="End-to-end tests running" \
            -f target_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

  e2e-batch:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        batch: [1, 2, 3, 4]
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1

      - name: Set up Kind
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1.14.0
        with:
          install_only: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Run end-to-end test (batch ${{ matrix.batch }})
        run: make docker-build e2e-batch-${{ matrix.batch }}

  e2e-migration:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1

      - name: Set up Kind
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1.14.0
        with:
          install_only: true

      - name: Set up Helm
        uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5.0.1

      - name: Set up Flux CLI
        uses: fluxcd/flux2/action@6a650dba1b4ae9945185c4bb3cc3f386aaf71b3d # v2.9.2

      - name: Set up flux-operator CLI
        uses: controlplaneio-fluxcd/flux-operator/actions/setup@218983dc89166c4d886ca9fe12800d17b4d11150 # v0.55.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Run migration end-to-end test
        run: make docker-build e2e-migration

  e2e-critical-components:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1

      - name: Set up Kind
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1.14.0
        with:
          install_only: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Run critical components end-to-end test
        run: make docker-build e2e-critical-components

  e2e-debug-shell:
    # Windows-only smoke test that exercises the debug_on_failure local-exec
    # template against a fake kubectl on PATH. Validates that the bash
    # interpreter (Git Bash on Windows) can run the same template the module
    # ships, without needing Docker or kind. The full Linux end-to-end is
    # already covered by e2e-batch (matrix entry 2).
    runs-on: windows-latest
    name: e2e-debug-shell on Windows
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1

      - name: Verify toolchain
        shell: bash
        run: |
          set -euo pipefail
          echo "RUNNER_OS=$RUNNER_OS"
          command -v bash
          bash --version | head -1
          command -v terraform
          terraform version

      - name: Run debug shell smoke test
        shell: bash
        run: bash ./scripts/e2e-debug-shell.sh

  e2e-offline-plan:
    # Proves that `terraform plan` succeeds against an unreachable cluster
    # with empty state, so the module can live in the same root module that
    # creates the cluster. No Docker or kind needed.
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1

      - name: Run offline plan test
        run: make e2e-offline-plan

  e2e:
    if: always()
    needs: [e2e-pending, e2e-batch, e2e-migration, e2e-critical-components, e2e-debug-shell, e2e-offline-plan]
    runs-on: ubuntu-latest
    steps:
      - name: Update status on PR
        if: github.event.pull_request.head.repo.fork != true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for result in "${{ needs.e2e-batch.result }}" "${{ needs.e2e-migration.result }}" "${{ needs.e2e-critical-components.result }}" "${{ needs.e2e-debug-shell.result }}" "${{ needs.e2e-offline-plan.result }}"; do
            if [ "$result" != "success" ] && [ "$result" != "skipped" ]; then
              gh api "repos/${{ github.repository }}/statuses/${{ github.sha }}" \
                -f state=failure \
                -f context="e2e" \
                -f description="End-to-end tests failed" \
                -f target_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
              exit 1
            fi
          done
          gh api "repos/${{ github.repository }}/statuses/${{ github.sha }}" \
            -f state=success \
            -f context="e2e" \
            -f description="End-to-end tests passed" \
            -f target_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

      - name: Verify result
        run: |
          for result in "${{ needs.e2e-batch.result }}" "${{ needs.e2e-migration.result }}" "${{ needs.e2e-critical-components.result }}" "${{ needs.e2e-debug-shell.result }}" "${{ needs.e2e-offline-plan.result }}"; do
            [ "$result" = "success" ] || [ "$result" = "skipped" ] || exit 1
          done
