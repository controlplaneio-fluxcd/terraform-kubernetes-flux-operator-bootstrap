apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}
  namespace: {{ .Release.Namespace }}
  annotations:
    flux-operator-bootstrap/revision: {{ .Values.revision | quote }}
data:
  flux-instance.yaml: |
{{ .Values.gitopsResources.instance | indent 4 }}
{{- range $key, $value := .Values.gitopsResources.prerequisites.manifests }}
  {{ $key }}: |
{{ $value | indent 4 }}
{{- end }}
{{- if .Values.gitopsResources.operatorChart.values }}
  operator-values.yaml: |
{{ .Values.gitopsResources.operatorChart.values | indent 4 }}
{{- end }}
{{- if .Values.gitopsResources.prerequisites.charts }}
  prerequisite-charts.json: |
    {{ .Values.gitopsResources.prerequisites.charts | toJson }}
{{- range $i, $chart := .Values.gitopsResources.prerequisites.charts }}
{{- if $chart.values }}
  chart-values-{{ $i }}.yaml: |
{{ $chart.values | indent 4 }}
{{- end }}
{{- end }}
{{- end }}
{{- if .Values.managedResources.runtimeInfo.data }}
  runtime-info.env: |
{{- range $key, $value := .Values.managedResources.runtimeInfo.data }}
    {{ $key }}={{ $value }}
{{- end }}
  runtime-info-labels.env: |
{{- range $key, $value := .Values.managedResources.runtimeInfo.labels }}
    {{ $key }}={{ $value }}
{{- end }}
  runtime-info-annotations.env: |
{{- range $key, $value := .Values.managedResources.runtimeInfo.annotations }}
    {{ $key }}={{ $value }}
{{- end }}
{{- end }}
